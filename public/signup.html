<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kapfi Equity | Broker Signup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/portal.css" />
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <img src="/assets/kapfi-logo.svg" alt="Kapfi logo" class="login-logo" />
      <h1>Broker Signup</h1>
      <p>Create your broker portal account</p>
      <form id="signupForm">
        <label for="name">Full Name</label>
        <input id="name" name="name" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />

        <button type="submit">Create Account</button>
      </form>
      <p id="message" class="msg"></p>
      <p id="error" class="error"></p>
      <p class="hint"><a href="/login.html">Back to login</a></p>
    </section>
  </main>
  <script src="/signup.js"></script>
</body>
</html>
